<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220">
  <rect width="800" height="220" fill="white"/>

  <!-- Hydro Flask figure icon, centered at (105, 115) -->
  <g transform="translate(105,115)" stroke="#111111" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Fingers (5 rounded rays going upward) -->
    <line x1="-42" y1="-30" x2="-68" y2="-92" stroke-width="16"/>
    <line x1="-18" y1="-40" x2="-22" y2="-100" stroke-width="16"/>
    <line x1="3"   y1="-44" x2="3"   y2="-104" stroke-width="16"/>
    <line x1="24"  y1="-40" x2="28"  y2="-100" stroke-width="16"/>
    <line x1="46"  y1="-30" x2="72"  y2="-92"  stroke-width="16"/>

    <!-- Palm / face outline (open-bottom arc) -->
    <path d="M-56,-18 Q-60,20 -30,36 Q0,46 30,36 Q60,20 56,-18" stroke-width="16"/>

    <!-- Smile inside palm -->
    <path d="M-16,14 Q2,30 20,14" stroke-width="11"/>

    <!-- Arms spreading wide downward -->
    <line x1="-52" y1="10"  x2="-92"  y2="68"  stroke-width="16"/>
    <line x1="52"  y1="10"  x2="92"   y2="68"  stroke-width="16"/>

    <!-- Legs spreading at bottom -->
    <line x1="-22" y1="68"  x2="-34"  y2="110" stroke-width="16"/>
    <line x1="22"  y1="68"  x2="34"   y2="110" stroke-width="16"/>
  </g>

  <!-- "Hydro Flask" text -->
  <text
    x="225"
    y="148"
    font-family="'Arial Rounded MT Bold', 'Helvetica Neue', Arial, sans-serif"
    font-size="100"
    font-weight="900"
    fill="#111111"
    text-anchor="start"
    letter-spacing="-1"
  >Hydro Flask</text>
</svg>
